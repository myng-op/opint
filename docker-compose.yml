services:
  mongo:
    image: mongo:7
    container_name: opint-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - opint-mongo-data:/data/db

  agent:
    build:
      context: ./agent
    container_name: opint-agent
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8001:8001"
    env_file:
      - ./.env
    environment:
      MONGO_URI: mongodb://mongo:27017/opint
      PY_AGENT_PORT: "8001"
      PROMPTS_DIR: /app/prompts/anna
    volumes:
      - ./prompts/anna:/app/prompts/anna:ro

volumes:
  opint-mongo-data:
