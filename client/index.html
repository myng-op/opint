<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anna — Interview</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #2A1407;
        color: #2A1F1A;
        font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      button { font-family: inherit; }

      /* Idle orb float — a subtle breath when nothing else is moving. */
      @keyframes orbDrift {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-8px); }
      }

      /* Staggered reveal for landing hero words. */
      @keyframes riseIn {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* The green "live" dot on the transcript card. */
      @keyframes livePulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%      { transform: scale(1.3); opacity: 0.6; }
      }

      /* Subtle grain / atmosphere — drifts slowly under the orb for life. */
      @keyframes atmosphereDrift {
        0%   { background-position: 0% 0%, 0% 0%, 0% 0%; }
        50%  { background-position: 4% -3%, -4% 3%, 2% 4%; }
        100% { background-position: 0% 0%, 0% 0%, 0% 0%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
